
# checkpoint: outputs/training/long26_gt_pos_null_10_lg1e-03_lr5e-05_5bin/checkpoint_best.tar
checkpoint: outputs/training/py_colmap_1e-12+lg_HM/checkpoint_best.tar

model:
    name: two_view_pipeline
    extractor:
      name: extractors.sift
      backend: pycolmap_cuda
      max_num_keypoints: 4096
      detection_threshold: 0.0066667
      rootsift: true
      nms_radius: 0
      first_octave: -1
      num_octaves: 4
      init_blur: 1.0
      force_num_keypoints: False
      trainable: False
      filter_kpts_with_wrapper: false          # Only for py_cudasift. Truncate max kpts as Cudasift
      filter_with_scale_weighting: true      # for all that has scores. Multiply scores by scales.
      extractor_channel: grayscale            # Colon: green
      filter_with_lowest_scale: false     # Default is false. Only for those who dont have scores, scale as filter proxy.  
      random_topk: False # if True, pick random topk even when scores are available 


    matcher:
      name: matchers.lightglue
      features: sift
      depth_confidence: -1
      width_confidence: -1
      filter_threshold: 0.1
      input_dim: 128      
      add_scale_ori: true

benchmarks:
    megadepth1500:
      data:
        preprocessing:
          side: long
          resize: 1600
      eval:
        estimator: poselib
        ransac_th: 1
    hpatches:
      eval:
        estimator: opencv
        ransac_th: 0.5
      model:
        extractor:
          max_num_keypoints: 1024  # overwrite config above
