model:
    extractor:
        name: null # Set this for sparse matching
    matcher:
        name: roma
        weights: outdoor
        sample_num_matches: 10000
        internal_hw: [560, 560]
benchmarks:
    megadepth1500:
        data:
            preprocessing:
                resize: 1024
        model:
            matcher:
                internal_hw: [630, 630]  # > 644 yields MAGMA warning, official: 672
                output_hw: [1344, 1344]
                sample_num_matches: 5000
        eval:
            estimator: poselib
            ransac_th: 1  # Use 1 for poselib
    endomapper_dense1500:
        model:
            matcher:
                weights: indoor # Default outdoor. Options indoor, outdoor
                internal_hw: [518, 518] # Default 560x560. Must be square, divisible by 14
                output_hw: [518, 672]   # Default None. Not square constrained, dibisible by 14
                sample_num_matches: 5000 # if <=0 dense matching
                # max_kp_error: 2         # Default 2
                # filter_threshold: 0.05 # Default 0.05
        eval:
            estimator: poselib
            ransac_th: 1
    scannet1500:
        model:
            matcher:
                weights: indoor
                sample_num_matches: 5000
        eval:
            estimator: opencv
            ransac_th: 0.5
