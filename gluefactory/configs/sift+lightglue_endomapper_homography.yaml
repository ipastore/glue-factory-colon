data:
    name: homographies
    data_dir: all_SLAM_ENE26
    train_size: 150000
    val_size: 2000
    image_list: null  
    batch_size: 1 #64
    num_workers: 1 #14
    right_only: False
    
    #Endomapper
    left_view_difficulty: 0.0 # Overrides lef difficulty for homography == img0 orig + photometric augmentation
    right_view_difficulty: 0.7
    crop_vignette: True
    vignette_crop_coords: [81, 663, 55, 484]   # #w=582 h=429  . For images of 1350x1012: [276, 1076, 206, 806]  [x1, x2, y1, y2]; # width = 800, height = 600, aspect ≈ 4/3
    #Endomapper

    homography:
        difficulty: 0.7
        max_angle: 45
        patch_shape: [580,426] # [pwidth,pheight] 640x480 Original.


    photometric:
        name: lg
model:
    name: two_view_pipeline
    extractor:
        name: extractors.sift
        backend: pycolmap_cuda
        max_num_keypoints: 1024
        force_num_keypoints: True
        nms_radius: 3
        trainable: False
        detection_threshold: 1e-12  # 0.0066667 from COLMAP; scale by 255 for cudasift; 1e-12
        rootsift: true
        first_octave: -1           #Defualt for pycolmap -1; I think that for cudasift is the same as 0
        num_octaves: 4            # Colmap: 4; Colon: 3; Imitation for Cudasift: 6
        init_blur: 1.0             # Only used by py_cudasift; Colon: 2.0;  CudaSift default: 1.0
        filter_kpts_with_wrapper: false   # Only for py_cudasift. Truncate max kpts as Cudasift.
        filter_with_scale_weighting: True  # for all that has scores. Multiply scores by scales.
        extractor_channel: grayscale         # Colon: green.
        filter_with_lowest_scale: false     # Default is false. Only for those who dont have scores, scale as filter proxy.  
        random_topk: False            # if True, pick random topk even when scores are available 
        mask_out_padded_kpts: True 
    ground_truth:
        name: matchers.homography_matcher
        th_positive: 3
        th_negative: 3
    matcher:
        name: matchers.lightglue
        filter_threshold: 0.1
        flash: false
        checkpointed: true
        input_dim: 128
        add_scale_ori: true
train:
    seed: 0
    epochs: 40
    log_every_iter: 100
    eval_every_iter: 500
    lr: 1e-4
    lr_schedule:
        start: 20
        type: exp
        on_epoch: true
        exp_div_10: 10
    plot: [5, 'gluefactory.visualization.visualize_batch.make_match_figures']
    # load_experiment: sift+lg_pretrained           # nothing before  

benchmarks:
    hpatches:
      eval:
        estimator: opencv
        ransac_th: 0.5
      model:
        extractor:
          nms_radius: 0
