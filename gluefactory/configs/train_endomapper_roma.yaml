data:
    name: endomapper_roma
    data_dir: slam-results_long_sequences_ENE26
    train_split: train_seqs.txt
    train_num_per_scene: 300  #300
    val_split: val_seqs.txt
    val_num_per_scene: null # null to be overridden by val_pairs
    val_pairs: val_pairs.txt   #TODO: make the txt with the pairs
    overfit_split: overfit_seqs.txt
    overfit_pairs: null
    overfit_num_per_scene: 10 
    min_overlap: 0.0
    max_overlap: 0.99
    num_overlap_bins: 5
    batch_size: 32 #32
    num_workers: 14 #14
    min_images_per_map: 25 
    read_image: true
    grayscale: false
    load_features:
        do: true
        path: exports/endomapper-roma-cudasift-k2048_no_scale/{seq_map}.h5
        padding_length: 2048
        padding_fn: pad_local_features
        data_keys: ["keypoints", "keypoint_scores", "descriptors", "oris", "scales"] #* #eraesd: , "depth_keypoints", "valid_depth_keypoints"


model:
    name: two_view_pipeline
    extractor:
            name: null
            # name: extractors.sift
            # backend: py_cudasift
            # max_num_keypoints: 1024
            # force_num_keypoints: True
            # nms_radius: 3
            # detection_threshold: 0.0000667
            # rootsift: True
            # first_octave: -1
            # num_octaves: 4
            # init_blur: 1.0
            # extractor_channel: grayscale
            # filter_kpts_with_wrapper: False           # Only for py_cudasift. Truncate max kpts as Cudasift
            # filter_with_scale_weighting: False      # for all that has scores. Multiply scores by scales.
            # filter_with_lowest_scale: False      # Default is false. Only for those who dont have scores, scale as filter proxy.  
            # random_topk: False # if True, pick random
    matcher:
        name: matchers.lightglue
        filter_threshold: 0.1
        flash: true
        checkpointed: true
        add_scale_ori: true
        input_dim: 128

    ground_truth:
        name:  matchers.roma_gt_matcher #TODO add config for roma gt matcher
        save_fig_when_debug: true
        th_positive: 3.0
        th_negative: 5.0
        roma:
            name: matchers.roma
            weights: outdoor
            upsample_preds: false #debug false
            symmetric: false #debug false
            internal_hw: [224, 224] #[532, 714] [546 x 728]  original size [540,720] [224,224] debug
            output_hw: null
            sample: false
            mixed_precision: true
            add_cycle_error: true
            pos_cert_th: 0.05
            pos_cycle_error_th: 2.0
            neg_cert_th: 0.0005
            neg_cycle_error_th: 20.0
    allow_no_extract: true
    run_gt_in_forward: true

train:
    seed: 0
    epochs: 50
    log_every_iter: 100
    eval_every_iter: 1000

    # Write into tb gt figures
    log_gt_pos_val_once: true
    log_gt_pos_overfit_once: true
    log_gt_pos_neg_ign_val_once: true
    log_gt_pos_neg_ign_overfit_once: true

    # Log into txt metrics for all val and overfit datasets
    log_val_metrics: true
    log_overfit_metrics: true
    eval_overlap_bins:
        - [0.0, 0.2]
        - [0.2, 0.4]
        - [0.4, 0.6]
        - [0.6, 0.8]
        - [0.8, 0.99]
    eval_overlap_bins_include_overall: true
    load_experiment: 04-py_cudasift+lg_MD_3D #03-py_cudasift+lg_OP_HOMO #04-py_cudasift+lg_MD_3D 05-sift_cudasift+lg_ENDO_3D
    

    lr: 2e-4
    lr_schedule:
        start: 10
        type: exp
        on_epoch: true
        exp_div_10: 45 # 0.95 per epoch

    dataset_callback_fn: sample_new_items
    plot: [2, 'gluefactory.visualization.visualize_batch.make_match_figures']
    plot_ignored_predictions: true
    save_eval_figs: false
    keep_last_checkpoints: 2  # keep only the last X checkpoints
